backend:
  name: git-gateway
  branch: main

# Wird durch Netlify Identity verwaltet (Login-Screen erscheint automatisch)
local_backend: false

publish_mode: simple

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:

  # ============ AKTUELLES / NEWS ============
  - name: "aktuelles"
    label: "Aktuelles / News"
    files:
      - file: "_data/aktuelles.json"
        label: "News-Beiträge"
        name: "aktuelles"
        fields:
          - label: "News-Beiträge"
            name: "news"
            widget: "list"
            label_singular: "News-Beitrag"
            summary: "{{titel}} ({{datum}})"
            fields:
              - { label: "Datum", name: "datum", widget: "string", hint: "z.B. 18. April 2026" }
              - { label: "Titel", name: "titel", widget: "string" }
              - { label: "Text", name: "text", widget: "text" }
              - { label: "Aktuell / Hervorgehoben", name: "hervorgehoben", widget: "boolean", default: false, hint: "Der oberste hervorgehobene Eintrag wird auf der Startseite als Highlight angezeigt" }
              - { label: "Titelbild (optional)", name: "bild", widget: "image", required: false, hint: "Großes Bild oben im Beitrag" }
              - { label: "Bilderserie (optional)", name: "galerie", widget: "list", required: false, field: { label: "Bild", name: "bild", widget: "image" }, hint: "Mehrere Fotos, werden als Galerie unter dem Text angezeigt" }

  # ============ PREISE ============
  - name: "preise"
    label: "Preise & Mitgliedschaft"
    files:
      - file: "_data/preise.json"
        label: "Preise"
        name: "preise"
        fields:
          - label: "Tarife"
            name: "tarife"
            widget: "list"
            label_singular: "Tarif"
            summary: "{{name}} ({{altersgruppe}}) – {{laufzeit}} – {{preis}},{{cent}} €"
            hint: "Jeder Tarif hat einen eigenen Namen, eine Laufzeit, einen Preis und eine Altersgruppe. Reihenfolge per Drag&Drop änderbar."
            fields:
              - { label: "Name", name: "name", widget: "string", hint: "z.B. Panthers, BJJ, Mini Panthers" }
              - { label: "Laufzeit", name: "laufzeit", widget: "string", hint: "z.B. 12 Monate oder Flex · monatlich" }
              - label: "Altersgruppe"
                name: "altersgruppe"
                widget: "select"
                options: ["Erwachsene", "Kinder"]
                default: "Erwachsene"
              - { label: "Preis (Euro, ganze Zahl)", name: "preis", widget: "string", hint: "z.B. 54" }
              - { label: "Preis (Cent, zweistellig)", name: "cent", widget: "string", hint: "z.B. 90" }
              - { label: "Beschreibungstext", name: "hinweis", widget: "text" }
              - { label: "Sparhinweis (optional)", name: "sparhinweis", widget: "string", required: false, hint: "z.B. ↓ Günstigster Tarif – leer lassen wenn keiner" }
              - { label: "Als 'Beliebt' markieren", name: "beliebt", widget: "boolean", default: false }

          - label: "Anmeldegebühr"
            name: "anmeldegebuehr"
            widget: "object"
            fields:
              - { label: "Betrag (für Überschrift)", name: "betrag", widget: "string", hint: "z.B. 49,90 €" }
              - { label: "Überschrift", name: "titel", widget: "string" }
              - { label: "Text", name: "text", widget: "text" }

  # ============ SEMINARE ============
  - name: "seminare"
    label: "Seminare"
    files:
      - file: "_data/seminare.json"
        label: "Seminartermine"
        name: "seminare"
        fields:
          - label: "Seminare"
            name: "seminare"
            widget: "list"
            label_singular: "Seminar"
            summary: "{{titel}} – {{datum}}"
            fields:
              - { label: "Titel", name: "titel", widget: "string" }
              - { label: "Datum & Uhrzeit", name: "datum", widget: "string", hint: "z.B. Samstag, 25. April 2026 | 10:00 – 14:00 Uhr" }
              - { label: "Beschreibung", name: "text", widget: "text" }
              - { label: "Titelbild (optional)", name: "bild", widget: "image", required: false }
              - { label: "Bilderserie (optional)", name: "galerie", widget: "list", required: false, field: { label: "Bild", name: "bild", widget: "image" }, hint: "Mehrere Fotos, werden als Galerie unter dem Text angezeigt" }
              - { label: "Anmelde-Link (optional)", name: "link", widget: "string", required: false }

  # ============ STUNDENPLAN ============
  - name: "stundenplan"
    label: "Stundenplan"
    files:
      - file: "_data/stundenplan.json"
        label: "Trainingszeiten"
        name: "stundenplan"
        fields:
          - label: "Wochentage"
            name: "tage"
            widget: "list"
            label_singular: "Tag"
            summary: "{{tag}}"
            fields:
              - { label: "Wochentag", name: "tag", widget: "string" }
              - label: "Kurse"
                name: "kurse"
                widget: "list"
                label_singular: "Kurs"
                summary: "{{zeit}} – {{name}}"
                fields:
                  - { label: "Uhrzeit", name: "zeit", widget: "string", hint: "z.B. 18:00 – 19:15" }
                  - { label: "Kursname", name: "name", widget: "string" }

  # ============ TEAM ============
  - name: "team"
    label: "Team"
    files:
      - file: "_data/team.json"
        label: "Team-Mitglieder"
        name: "team"
        fields:
          - label: "Team"
            name: "team"
            widget: "list"
            label_singular: "Trainer/in"
            summary: "{{name}} – {{rolle}}"
            fields:
              - { label: "Kürzel/Initiale (für Avatar, falls kein Foto)", name: "kuerzel", widget: "string", hint: "Ein Buchstabe, z.B. S" }
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Rolle", name: "rolle", widget: "string" }
              - { label: "Bio / Beschreibung", name: "bio", widget: "text" }
              - { label: "Foto (optional)", name: "foto", widget: "image", required: false, hint: "Wenn ein Foto hochgeladen wird, ersetzt es den Buchstaben-Avatar" }

  # ============ ALLGEMEINE INHALTE ============
  - name: "inhalte"
    label: "Allgemeine Inhalte"
    files:
      - file: "_data/inhalte.json"
        label: "Kontakt, Startseite & Trainerausbildung"
        name: "inhalte"
        fields:
          - label: "Kontaktdaten"
            name: "kontakt"
            widget: "object"
            fields:
              - { label: "Adresse Zeile 1 (Straße)", name: "adresse_zeile1", widget: "string" }
              - { label: "Adresse Zeile 2 (PLZ Ort)", name: "adresse_zeile2", widget: "string" }
              - { label: "Telefonnummer (Anzeige)", name: "telefon", widget: "string", hint: "z.B. 0178 - 83 46 838" }
              - { label: "Telefonnummer (für Link, mit Ländervorwahl)", name: "telefon_link", widget: "string", hint: "z.B. +491788346838" }
              - { label: "E-Mail-Adresse", name: "email", widget: "string" }

          - label: "Startseite – Hero-Bereich"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Tagline", name: "tagline", widget: "string" }
              - { label: "Untertext", name: "untertext", widget: "text" }

          - label: "Startseite – Aktuelles Highlight"
            name: "highlight_seminar"
            widget: "object"
            fields:
              - { label: "Titel", name: "titel", widget: "string" }
              - { label: "Datum & Uhrzeit", name: "datum", widget: "string" }
              - { label: "Beschreibung", name: "text", widget: "text" }

          - label: "Trainerausbildung – Texte"
            name: "trainerausbildung"
            widget: "object"
            fields:
              - { label: "Beschreibungstext 1", name: "text1", widget: "text" }
              - { label: "Beschreibungstext 2", name: "text2", widget: "text" }
              - { label: "YouTube-Link (optional)", name: "youtube_link", widget: "string", required: false, hint: "Vollständiger YouTube-Link, z.B. https://www.youtube.com/watch?v=..." }

          - label: "Probetraining-Formular (MATOOL)"
            name: "probetraining_formular"
            widget: "object"
            hint: "Hier kannst du das interne Anfrageformular durch ein externes MATOOL-Formular ersetzen."
            fields:
              - { label: "iframe-Einbettungscode von MATOOL", name: "iframe_code", widget: "text", required: false, hint: "Den kompletten <iframe ...>...</iframe>-Code aus MATOOL hier einfügen. Leer lassen, um das bisherige interne Formular weiter zu verwenden." }
              - { label: "Höhe des Formulars (in Pixel)", name: "hoehe", widget: "number", default: 600, hint: "Falls das Formular abgeschnitten wirkt oder zu viel Leerraum lässt, hier die Höhe anpassen, z.B. 600, 750, 900." }

          - label: "Startseite – CTA-Streifen"
            name: "cta_strip"
            widget: "object"
            hint: "Der farbige Streifen mit Aufruf-Text und Button, direkt unter dem Hero-Bereich."
            fields:
              - { label: "Überschrift Teil 1", name: "headline_teil1", widget: "string", hint: "z.B. Fit für die Straße. Stark im Ring." }
              - { label: "Überschrift Teil 2 (hervorgehoben, zweite Zeile)", name: "headline_teil2", widget: "string", hint: "z.B. Bereit für dich selbst." }
              - { label: "Untertext", name: "untertext", widget: "text" }
              - { label: "Button-Text", name: "button_text", widget: "string", hint: "z.B. Jetzt Probetraining buchen" }

          - label: "Startseite – Trainingsbereich"
            name: "training_bereich"
            widget: "object"
            hint: "Der Bereich 'Unser Training' mit den drei Kästchen Selbstverteidigung, Kampfsport und Fitness."
            fields:
              - { label: "Label über der Überschrift", name: "section_label", widget: "string", hint: "z.B. Was wir trainieren" }
              - { label: "Überschrift Teil 1", name: "titel_teil1", widget: "string", hint: "z.B. Unser" }
              - { label: "Überschrift Teil 2 (hervorgehoben)", name: "titel_teil2", widget: "string", hint: "z.B. Training" }
              - { label: "Beschreibungstext", name: "beschreibung", widget: "text" }
              - label: "Kästchen"
                name: "karten"
                widget: "list"
                label_singular: "Kästchen"
                summary: "{{titel}}"
                min: 1
                fields:
                  - { label: "Kategorie-Label (klein, über dem Titel)", name: "icon_label", widget: "string", hint: "z.B. Selbstverteidigung, Kampfsport, Fitness" }
                  - { label: "Titel", name: "titel", widget: "string" }
                  - { label: "Text", name: "text", widget: "text" }

  # ============ IMPRESSUM ============
  - name: "impressum"
    label: "Impressum"
    files:
      - file: "_data/impressum.json"
        label: "Impressum"
        name: "impressum"
        fields:
          - label: "Angaben gemäß § 5 TMG"
            name: "angaben"
            widget: "object"
            fields:
              - { label: "Überschrift", name: "h", widget: "string" }
              - { label: "Text", name: "text", widget: "text" }
          - label: "Kontakt"
            name: "kontakt_impressum"
            widget: "object"
            fields:
              - { label: "Überschrift", name: "h", widget: "string" }
              - { label: "Text", name: "text", widget: "text" }
          - label: "Steuerliche Angaben"
            name: "steuer"
            widget: "object"
            fields:
              - { label: "Überschrift", name: "h", widget: "string" }
              - { label: "Text", name: "text", widget: "text" }
          - label: "Verantwortlich für den Inhalt"
            name: "inhalt"
            widget: "object"
            fields:
              - { label: "Überschrift", name: "h", widget: "string" }
              - { label: "Text", name: "text", widget: "text" }
          - label: "Haftungsausschluss"
            name: "haftung"
            widget: "object"
            fields:
              - { label: "Überschrift", name: "h", widget: "string" }
              - { label: "Text", name: "text", widget: "text" }
          - label: "Haftung für Links"
            name: "links"
            widget: "object"
            fields:
              - { label: "Überschrift", name: "h", widget: "string" }
              - { label: "Text", name: "text", widget: "text" }
          - label: "Urheberrecht"
            name: "urheberrecht"
            widget: "object"
            fields:
              - { label: "Überschrift", name: "h", widget: "string" }
              - { label: "Text", name: "text", widget: "text" }
